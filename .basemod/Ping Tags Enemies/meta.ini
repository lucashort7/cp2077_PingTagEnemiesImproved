nexusDescription="[size=5][b]Description[/b][/size]\n<br />\n<br />[size=3]Normally, when you use the ping quickhack the game allows you to tag all revealed enemies through walls. The problem is, that this feature doesn't work very well, and as a result your tagging attempts are often ignored or you end up tagging other objects instead. The access points are also revealed, however, they are a bit difficult to spot among all the other cluttter that appears along with them.\n<br />\n<br />To alleviate this, this mod will automatically tag all revealed enemies and other devices. Simple as that. \n<br />\n<br />There are 3 available versions:\n<br />\n<br />[/size][list=1]\n<br />[*][size=3]Tag all enemies and access points[/size]\n<br />[*][size=3]Tag all enemies, access points, cameras and turrets[/size]\n<br />[*][size=3]Tag only enemies[/size]\n<br />[/list][size=5][b]Customization[/b][/size]\n<br />\n<br />[size=3]The mod can be customized using [b]Mod Settings[/b] mod. The configuration menu will be under [b]Mod Settings [/b]section in the main menu. If the configuration section doesn't appear, you probably don't have Mod Settings installed, or you installed it incorrectly.[/size]\n<br />\n<br />[b][size=5]Requirements[/size][/b]\n<br />\n<br />[list]\n<br />[*][size=3]redscript[/size]\n<br />[*][size=3]red4ext or cybercmd - but only if you have REDmod installed[/size]\n<br />[*][size=3]Mod Settings[/size]\n<br />[/list][size=3]\n<br />[/size][b][size=5]Installation\n<br />\n<br />[/size][/b][size=3]Install using Vortex or unzip the r6 directory into your game directory[/size]\n<br />\n<br />[size=5][b]Known issues[/b][/size]\n<br />\n<br />[size=3]There are some very minor issues, however they don't really interfere with normal gameplay and can be worked around.\n<br />\n<br />[/size][list]\n<br />[*][size=3]When you ping an enemy and then untag them immedaitely, in some cases there might be a bit of delay before ping can tag them again. It doesn't always happen, but if it does, you just need to wait a bit.[/size]\n<br />[*][size=3]Some cameras will be tagged just by hovering over them in scanning mode. This cannot be worked around, as the game doesn't specify whether the camera was revealed by ping or by scanning. You can hack the camera and turn it off to permanently untag it (turned off cameras are not tagged by default) or disable camera tagging in options[/size]\n<br />[*][size=3]Hackable computers can sometimes be tagged automatically in focus mode when they are connected to a revealed camera. Similarly to cameras, you can either hack them or disable computer tagging in options[/size]\n<br />[*][size=3]In areas with a lot of enemies some may not be revealed by ping in the first place, and therefore won't be tagged[/size]\n<br />[/list]\n<br />[b][size=5]Changelog\n<br />\n<br />[/size][/b][size=3]1.1 (October 14th 2023)\n<br />[/size][list]\n<br />[*][size=3]Fixed enemies being automatically tagged while using an optics cyberware that highlights enemies[/size]\n<br />[/list][size=3]1.2 (October 19th 2023)\n<br />[/size][list]\n<br />[*][size=3]Fully configurable version allowing you to select what should be tagged[/size]\n<br />[*][size=3]Added an option to tag hackable computers in addition to access points[/size]\n<br />[*][size=3]Added an option to automatically untag cameras when they are turned off[/size]\n<br />[*][size=3]Added an option to prevent turned off cameras from being tagged[/size]\n<br />[/list]"
